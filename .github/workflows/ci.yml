name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web (tsc + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx next lint

  mobile:
    name: Mobile (sintaxis + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      # Los .js de core y de la app mobile no tienen build: chequeo de sintaxis.
      - name: Sintaxis de packages/core
        run: for f in packages/core/src/*.js packages/core/src/hooks/**/*.js; do node --check "$f"; done
        shell: bash
      - name: Tests del motor de sync
        run: npm --workspace gymtrack run test
