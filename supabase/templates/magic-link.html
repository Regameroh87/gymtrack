<!-- Plantilla "Magic Link": se envía a un usuario EXISTENTE (login por OTP,
     shouldCreateUser:false). Incluir {{ .Token }} envía el código de 6 dígitos
     en vez de un magic link. Mantiene el login OTP actual funcionando. -->
<div style="font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; max-width: 480px; margin: 0 auto; padding: 32px 24px; color: #1c1c24;">
  <h2 style="font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin: 0 0 8px;">
    Tu código de acceso
  </h2>
  <p style="font-size: 15px; line-height: 1.6; color: #4b4b57; margin: 0 0 24px;">
    Ingresá este código para acceder a tu cuenta de GymTrack:
  </p>
  <div style="font-size: 34px; font-weight: 800; letter-spacing: 8px; text-align: center; background: #f2f1ff; color: #4a44e4; border-radius: 14px; padding: 20px 0; margin: 0 0 24px;">
    {{ .Token }}
  </div>
  <p style="font-size: 13px; line-height: 1.6; color: #8a8a99; margin: 0;">
    El código vence en 1 hora. Si no fuiste vos, ignorá este mensaje.
  </p>
</div>
